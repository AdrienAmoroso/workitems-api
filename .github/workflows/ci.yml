name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Opt into Node.js 24 for all actions before the forced migration on June 2nd 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only deploy on push to master, not on pull requests
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish
        run: dotnet publish src/WorkItems.Api/WorkItems.Api.csproj --configuration Release --output ./publish

      - name: Zip publish output
        # cd into the folder so DLLs land at the zip root, not inside a publish/ subdirectory.
        # Azure App Service requires *.runtimeconfig.json to be at the root to detect the startup DLL.
        run: cd publish && zip -r ../publish.zip .

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: workitems-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish.zip
